name: NVRS
options:
  bundleIdPrefix: com.jonathan859
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  NVRS:
    type: application
    platform: iOS
    sources:
      - NVRS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathan859.nvrs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: NVRS/Info.plist
      properties:
        CFBundleDisplayName: NVRS
        UIBackgroundModes: [audio]
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: >-
          NVRS connects to your PC over your Tailscale network to receive
          NVDA speech.
  # macOS app: same bundle id (universal purchase, one ASC record), same
  # shared sources; platform differences live behind #if os() in code.
  NVRSMac:
    type: application
    platform: macOS
    sources:
      - NVRS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathan859.nvrs
        PRODUCT_NAME: NVRS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
    info:
      # Outside the shared NVRS/ sources dir so neither target globs it.
      path: Info-macOS.plist
      properties:
        CFBundleDisplayName: NVRS
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: NVRSMac.entitlements
      properties:
        # App Sandbox is mandatory for Mac App Store / TestFlight builds;
        # outgoing TCP to the PC needs the network client exception.
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
