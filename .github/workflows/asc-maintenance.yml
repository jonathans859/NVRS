name: ASC maintenance

# Certificate housekeeping via the ASC API, on free Linux minutes.
# - revoke-dev-certs: revokes CI-minted Apple Development certificates
#   when the account hits Apple's cap (builds fail with "maximum number
#   of certificates"). Certificates are account-wide, so this reaches
#   every repo: CACHED_DEV_CERT_IDS must list the cached cert id of
#   EVERY repo on the account (comma separated), or a sweep run from here
#   will delete another project's cached cert. Certs younger than an hour
#   are skipped so a sweep can't race an in-flight build elsewhere.
# - mint-dev-cert: mints one Development certificate from a CSR generated
#   on the developer's machine (private key never leaves it). The cert is
#   public material and is handed back as an artifact; afterwards add its
#   id to the CACHED_DEV_CERT_IDS repo variable.

on:
  workflow_dispatch:
    inputs:
      action:
        description: What to do
        type: choice
        options: [list-certs, revoke-dev-certs, mint-dev-cert]
        default: list-certs
      csr_b64:
        description: Base64 of a PEM CSR (mint-dev-cert only)
        required: false
        default: ""

jobs:
  # Read-only inventory; revokes nothing.
  list-certs:
    if: inputs.action == 'list-certs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyjwt cryptography requests
      - name: List certificates
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          KEEP_CERT_IDS: ${{ vars.CACHED_DEV_CERT_IDS }}
          DRY_RUN: "true"
        run: python tools/asc_revoke_dev_certs.py

  revoke-dev-certs:
    if: inputs.action == 'revoke-dev-certs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyjwt cryptography requests
      - name: Revoke CI-minted Development certificates
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          KEEP_CERT_IDS: ${{ vars.CACHED_DEV_CERT_IDS }}
        run: python tools/asc_revoke_dev_certs.py

  mint-dev-cert:
    if: inputs.action == 'mint-dev-cert'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyjwt cryptography requests
      - name: Mint Development certificate from CSR
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          CSR_B64: ${{ inputs.csr_b64 }}
        run: python asc_mint_dev_cert.py
      - uses: actions/upload-artifact@v4
        with:
          name: dev-cert
          path: |
            tools/dev-cert.cer
            tools/dev-cert-id.txt
